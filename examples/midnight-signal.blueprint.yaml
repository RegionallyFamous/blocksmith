apiVersion: blocksmith.io/v0.1
kind: BlockTheme
target:
  wordpress: ">=6.6"
  themeJson: 3
  php: ">=8.1"
  blockProfile: core-stable
metadata:
  name: "Midnight Signal"
  slug: midnight-signal
  description: "A dark, electric blog theme for late-night essays, city notes, culture, software, and the private internet."
tasteProfile: magazine-dense
policy:
  profile: wporg-block-theme-v1
  allowRawCode: false
  allowRemoteAssets: false
assets:
