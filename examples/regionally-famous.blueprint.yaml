tokens:
  color:
    base: "#fffdf7"
    contrast: "#17130f"
    primary: "#b63f2d"
    secondary: "#245f68"
    muted: "#f1e6d2"
    surface: "#ffffff"
    surfaceAlt: "#f7eedf"
    border: "#dcc9aa"
    link: "#8e2f22"
    buttonBg: "#17130f"
    buttonText: "#fffdf7"
    focus: "#245f68"
  typography:
    bodyFont: "\"Source Sans 3\", sans-serif"
    headingFont: "Fraunces, Georgia, serif"
    scale:
      small: "0.875rem"
      base: "1rem"
      medium: "1.25rem"
      large: "2.25rem"
      xlarge: "3.5rem"
      huge: "4.75rem"
  spacing:
    xs: "0.5rem"
    sm: "1rem"
    md: "1.75rem"
    lg: "3.25rem"
    xl: "5rem"
    xxl: "7rem"
  layout:
    contentSize: "720px"
    wideSize: "1180px"
  radius:
    sm: "3px"
    md: "6px"
    lg: "8px"
  shadow:
    sm: "0 10px 28px rgba(23, 19, 15, 0.08)"
    md: "0 22px 56px rgba(23, 19, 15, 0.12)"
    lg: "0 34px 80px rgba(23, 19, 15, 0.16)"
templates:
  index:
    sections:
      - kind: part
        ref: header
      - kind: hero
        variant: editorial
        eyebrow: "Feature dispatch"
        title: "The old dance hall still holding Saturday nights"
        text: "Inside the century-old hall where two-stepping, live country, and community memory never went out of style."
        cta:
          label: "Read the story"
          url: "/category/dispatch/"
      - kind: featureGrid
        items:
          - title: "Corner stores still matter."
            text: "Three blocks, two owners, countless small kindnesses."
          - title: "The builders & the dreamers."
            text: "Conversations with the people shaping our community."
          - title: "Stories that stick around."
            text: "Local lore, tall tales, and the truth in between."
      - kind: postGrid
        title: "Latest dispatches"
        cta:
          label: "View all dispatches ->"
          url: "/category/dispatch/"
        query:
          perPage: 4
      - kind: intro
        variant: editor-note
        title: "We write about the places we love and the people who make them worth staying for."
        text: "This publication is a record of our region in real time. Thank you for reading, sharing, and showing up for where you live."
        cta:
          label: "Learn more about us"
          url: "/about/"
      - kind: ctaBand
        title: "Good stories in your inbox."
        text: "A weekly dispatch of local stories, recommendations, and behind-the-scenes notes from our editors."
        cta:
          label: "Subscribe"
          url: "/subscribe/"
      - kind: part
        ref: footer
