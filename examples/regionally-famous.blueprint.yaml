apiVersion: blocksmith.io/v0.1
kind: BlockTheme
target:
  wordpress: ">=6.6"
  themeJson: 3
  php: ">=8.1"
  blockProfile: core-stable
metadata:
  name: "Regionally Famous Dispatch"
  slug: regionally-famous-dispatch
  description: "A warm, sharp local-publication theme for neighborhood stories, cultural notes, and small-but-beloved places."
tasteProfile: editorial-clean
policy:
  profile: wporg-block-theme-v1
  allowRawCode: false
  allowRemoteAssets: false
