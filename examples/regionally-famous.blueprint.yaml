apiVersion: blocksmith.io/v0.1
kind: BlockTheme
target:
  wordpress: ">=6.6"
  themeJson: 3
  php: ">=8.1"
  blockProfile: core-stable
metadata:
  name: "Regionally Famous Dispatch"
  slug: regionally-famous-dispatch
  description: "A warm, sharp local-publication theme for neighborhood stories, cultural notes, and small-but-beloved places."
tasteProfile: editorial-clean
policy:
  profile: wporg-block-theme-v1
  allowRawCode: false
  allowRemoteAssets: false
assets:
  - path: assets/images/regionally-famous-masthead.jpg
    source: assets/regionally-famous-masthead.jpg
    role: hero
    license: AI-generated; human review required before public release
    author: OpenAI Imagegen
    generated: true
  - path: assets/fonts/fraunces-700.ttf
    source: assets/fonts/fraunces-700.ttf
    role: font
    license: Open Font License via Google Fonts
    author: Undercase Type
    fontFamily: Fraunces
    fontWeight: "700"
    fontStyle: normal
    fontDisplay: swap
  - path: assets/fonts/fraunces-800.ttf
    source: assets/fonts/fraunces-800.ttf
    role: font
    license: Open Font License via Google Fonts
    author: Undercase Type
    fontFamily: Fraunces
    fontWeight: "800"
    fontStyle: normal
    fontDisplay: swap
  - path: assets/fonts/fraunces-900.ttf
    source: assets/fonts/fraunces-900.ttf
    role: font
    license: Open Font License via Google Fonts
    author: Undercase Type
    fontFamily: Fraunces
    fontWeight: "900"
    fontStyle: normal
    fontDisplay: swap
  - path: assets/fonts/source-sans-3-400.ttf
    source: assets/fonts/source-sans-3-400.ttf
    role: font
    license: Open Font License via Google Fonts
    author: Adobe
    fontFamily: Source Sans 3
    fontWeight: "400"
    fontStyle: normal
    fontDisplay: swap
  - path: assets/fonts/source-sans-3-700.ttf
    source: assets/fonts/source-sans-3-700.ttf
    role: font
    license: Open Font License via Google Fonts
    author: Adobe
    fontFamily: Source Sans 3
    fontWeight: "700"
    fontStyle: normal
    fontDisplay: swap
  - path: assets/fonts/source-sans-3-900.ttf
    source: assets/fonts/source-sans-3-900.ttf
    role: font
    license: Open Font License via Google Fonts
    author: Adobe
    fontFamily: Source Sans 3
    fontWeight: "900"
    fontStyle: normal
    fontDisplay: swap
tokens:
  color:
    base: "#fffdf7"
    contrast: "#17130f"
    primary: "#b63f2d"
    secondary: "#245f68"
    muted: "#f1e6d2"
    surface: "#ffffff"
    surfaceAlt: "#f7eedf"
    border: "#dcc9aa"
    link: "#8e2f22"
    buttonBg: "#17130f"
    buttonText: "#fffdf7"
    focus: "#245f68"
  typography:
    bodyFont: "\"Source Sans 3\", sans-serif"
    headingFont: "Fraunces, Georgia, serif"
    scale:
      small: "0.875rem"
      base: "1rem"
      medium: "1.25rem"
      large: "2.25rem"
      xlarge: "3.5rem"
      huge: "4.75rem"
  spacing:
    xs: "0.5rem"
    sm: "1rem"
    md: "1.5rem"
    lg: "3rem"
    xl: "4.5rem"
    xxl: "6.5rem"
  layout:
    contentSize: "740px"
    wideSize: "1200px"
templates:
  index:
    sections:
      - kind: part
        ref: header
      - kind: hero
        variant: editorial
        eyebrow: "Dispatch"
        title: "The morning belongs to the neighborhood."
        text: "Coffee steam, bakery windows, and the first conversations of the day: notes from a slow walk through the old block."
        cta:
          label: "Read the dispatch"
          url: "/category/dispatch/"
      - kind: featureGrid
        items:
          - title: "Corner stores still matter."
            text: "Three blocks, two owners, countless small kindnesses."
          - title: "The builders & the dreamers."
            text: "Conversations with the people shaping our community."
          - title: "Stories that stick around."
            text: "Local lore, tall tales, and the truth in between."
      - kind: postGrid
        title: "Latest dispatches"
        query:
          perPage: 6
      - kind: intro
        variant: editor-note
        title: "We write about the places we love and the people who make them worth staying for."
        text: "This publication is a record of our region in real time. Thank you for reading, sharing, and showing up for where you live."
        cta:
          label: "Learn more about us"
          url: "/about/"
      - kind: ctaBand
        title: "Good stories in your inbox."
        text: "A weekly dispatch of local stories, recommendations, and behind-the-scenes notes from our editors."
        cta:
          label: "Subscribe"
          url: "/subscribe/"
      - kind: part
        ref: footer
